<svg viewBox="0 0 640 270" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,sans-serif" font-size="13">
  <!-- keyA: 닫힌 v1 + 시점에 유효한 v2(강조) -->
  <text x="16" y="76" font-weight="700">keyA</text>
  <rect x="70" y="50" width="150" height="44" fill="#ffffff" stroke="#444"/>
  <text x="145" y="77" text-anchor="middle">v1 · [10:00, 10:05)</text>
  <rect x="220" y="50" width="300" height="44" fill="#ffe49b" stroke="#444"/>
  <text x="370" y="77" text-anchor="middle">v2 · [10:05, now)</text>

  <!-- keyB: 시점에 유효한 v1(강조) + 미래 v2 -->
  <text x="16" y="136" font-weight="700">keyB</text>
  <rect x="70" y="110" width="300" height="44" fill="#ffe49b" stroke="#444"/>
  <text x="220" y="137" text-anchor="middle">v1 · [10:00, 10:10)</text>
  <rect x="370" y="110" width="150" height="44" fill="#ffffff" stroke="#444"/>
  <text x="445" y="137" text-anchor="middle">v2 · [10:10, now)</text>

  <!-- keyC: 단일 버전이 시점에 유효(강조) -->
  <text x="16" y="196" font-weight="700">keyC</text>
  <rect x="70" y="170" width="450" height="44" fill="#ffe49b" stroke="#444"/>
  <text x="295" y="197" text-anchor="middle">v1 · [10:00, now)</text>

  <!-- 시점 t=10:07 쿼리: 반투명 세로 박스가 타임라인을 관통 -->
  <rect x="265" y="34" width="30" height="196" fill="#ffd43b" fill-opacity="0.30" stroke="#e0930a" stroke-width="2"/>
  <text x="280" y="26" text-anchor="middle" fill="#b5740a" font-weight="700" font-size="12">asOf(10:07)</text>
</svg>
